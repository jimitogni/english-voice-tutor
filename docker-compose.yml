services:
  ollama:
    image: ollama/ollama:latest
    container_name: english-voice-tutor-ollama
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: english-voice-tutor-api
    restart: unless-stopped
    env_file:
      - .env.homelab
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      PIPER_EXECUTABLE: piper
      PIPER_MODEL_PATH: /app/models/piper/en_US-lessac-medium.onnx
      PIPER_CONFIG_PATH: /app/models/piper/en_US-lessac-medium.onnx.json
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_BASE_PATH: ${WEB_BASE_PATH:-/english}
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-}
    container_name: english-voice-tutor-web
    restart: unless-stopped
    networks:
      - default
      - proxy
    depends_on:
      api:
        condition: service_started
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik_proxy}"
      traefik.http.routers.english-voice-tutor.rule: "(Host(`${PUBLIC_APPS_HOST:-jimitogni.duckdns.org}`) || Host(`localhost`) || Host(`127.0.0.1`)) && PathPrefix(`${WEB_BASE_PATH:-/english}`)"
      traefik.http.routers.english-voice-tutor.entrypoints: "${TRAEFIK_HTTP_ENTRYPOINT:-web}"
      traefik.http.routers.english-voice-tutor.priority: "130"
      traefik.http.routers.english-voice-tutor.service: "english-voice-tutor"
      traefik.http.routers.english-voice-tutor-secure.rule: "Host(`${PUBLIC_APPS_HOST:-jimitogni.duckdns.org}`) && PathPrefix(`${WEB_BASE_PATH:-/english}`)"
      traefik.http.routers.english-voice-tutor-secure.entrypoints: "${TRAEFIK_HTTPS_ENTRYPOINT:-websecure}"
      traefik.http.routers.english-voice-tutor-secure.priority: "130"
      traefik.http.routers.english-voice-tutor-secure.tls: "true"
      traefik.http.routers.english-voice-tutor-secure.tls.certresolver: "${TRAEFIK_CERT_RESOLVER:-duckdns}"
      traefik.http.routers.english-voice-tutor-secure.service: "english-voice-tutor"
      traefik.http.services.english-voice-tutor.loadbalancer.server.port: "80"

volumes:
  ollama:

networks:
  proxy:
    external: true
    name: "${TRAEFIK_NETWORK:-traefik_proxy}"
