services:
  ollama:
    image: ollama/ollama:latest
    container_name: english-voice-tutor-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: english-voice-tutor-api
    restart: unless-stopped
    env_file:
      - .env.homelab
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      PIPER_EXECUTABLE: piper
      PIPER_MODEL_PATH: /app/models/piper/en_US-lessac-medium.onnx
      PIPER_CONFIG_PATH: /app/models/piper/en_US-lessac-medium.onnx.json
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-}
    container_name: english-voice-tutor-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_started

volumes:
  ollama:
